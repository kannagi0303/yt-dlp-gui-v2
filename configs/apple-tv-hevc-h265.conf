# Apple TV HEVC / H.265 output preset.
#
# Select this file from Advanced -> yt-dlp config file.
# Requires FFmpeg with HEVC encoder support.
#
# Output goal:
# - MP4 container for Apple's native player compatibility
# - HEVC/H.265 video encoded by the GUI-selected FFmpeg encoder
# - hvc1 video tag for Apple TV playback compatibility
# - AAC audio for broad Apple device compatibility
# - faststart metadata for faster local/network playback start
#
# Implementation:
# - This preset keeps yt-dlp output in an MP4 merge-friendly shape.
# - The GUI's Processing -> Apple TV HEVC / H.265 option now owns the FFmpeg
#   transcode that used to live in the companion PowerShell after_move script.
# - The GUI tries hardware HEVC encoders first when FFmpeg reports them:
#   hevc_nvenc, hevc_qsv, hevc_amf.
# - If hardware encoding is unavailable or fails at runtime, the GUI falls back
#   to libx265.
#
# Quality tuning:
# - Lower CRF means larger files and higher quality.
# - 24 is safer for quality; 26 is a smaller-file default.
# - Preset controls encoding speed/compression, not playback compatibility.

--format "bv*+ba/b"

--merge-output-format mp4
